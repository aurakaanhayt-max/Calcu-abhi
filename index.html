<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcu Abhi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    min-height: 100vh; 
    background: #0a0a0f; 
    font-family: 'Share Tech Mono', monospace; 
    overflow: hidden; 
  }

  .page { 
    display: none; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    width: 100%; 
  }
  .page.active { display: flex; }

  /* Welcome Page */
  .welcome-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #00ffb4;
    text-align: center;
    letter-spacing: 4px;
    text-shadow: 0 0 10px #00ffb4, 0 0 30px #00ffb4, 0 0 60px #00c896;
    animation: flicker 3s infinite;
    margin-bottom: 40px;
    padding: 0 20px;
  }

  .continue-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #001a12;
    background: linear-gradient(135deg, #00ffb4, #00c896);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,255,180,0.4);
    animation: pulse 2s infinite;
  }

  @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:0.8} 97%{opacity:1} 98%{opacity:0.6} 99%{opacity:1} }
  @keyframes pulse { 0%,100%{box-shadow:0 0 30px rgba(0,255,180,0.4)} 50%{box-shadow:0 0 50px rgba(0,255,180,0.7)} }

  /* Calculator */
  .title { 
    text-align:center; 
    font-family:'Orbitron',sans-serif; 
    font-size:28px; 
    font-weight:900; 
    letter-spacing:6px; 
    color:#00ffb4; 
    text-shadow:0 0 10px #00ffb4,0 0 25px #00ffb4,0 0 50px #00c896; 
    margin-bottom:18px; 
    animation:flicker 3s infinite; 
  }

  .calculator { 
    background:#111118; 
    border:1px solid rgba(0,255,180,0.2); 
    border-radius:20px; 
    padding:24px; 
    width:320px; 
    box-shadow:0 0 40px rgba(0,255,180,0.08),0 30px 60px rgba(0,0,0,0.8); 
  }

  .display { 
    background:#0d0d15; 
    border:1px solid rgba(0,255,180,0.15); 
    border-radius:12px; 
    padding:20px 16px 14px; 
    margin-bottom:20px; 
    text-align:right; 
  }

  .expression { 
    color:rgba(0,255,180,0.4); 
    font-size:12px; 
    min-height:18px; 
    margin-bottom:6px; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    white-space:nowrap; 
  }

  .result { 
    color:#00ffb4; 
    font-family:'Orbitron',sans-serif; 
    font-size:36px; 
    font-weight:700; 
    letter-spacing:2px; 
    text-shadow:0 0 20px rgba(0,255,180,0.5); 
    overflow:hidden; 
    text-overflow:ellipsis; 
    white-space:nowrap; 
  }
  .result.small { font-size:24px; }
  .result.tiny { font-size:18px; }

  .buttons { 
    display:grid; 
    grid-template-columns:repeat(4,1fr); 
    gap:10px; 
  }

  button { 
    background:#1a1a26; 
    border:1px solid rgba(255,255,255,0.06); 
    border-radius:12px; 
    color:#e0e0f0; 
    font-size:18px; 
    height:64px; 
    cursor:pointer; 
    transition:all 0.15s; 
  }

  button.op { background:#0f1f20; color:#00ffb4; }
  button.equal { background:linear-gradient(135deg,#00c896,#00a07a); color:#001a12; font-weight:700; font-size:22px; }
  button.clear { background:#1f0f15; color:#ff5064; }
  button.backspace { background:#1f1a0f; color:#ffb450; }
  button.zero { grid-column:span 2; }
</style>
</head>
<body>

<!-- Welcome Page -->
<div class="page active" id="welcomePage">
  <div class="welcome-title">Welcome to<br>Calcu Abhi</div>
  <button class="continue-btn" onclick="goToCalc()">CONTINUE ➜</button>
</div>

<!-- Calculator Page -->
<div class="page" id="calcPage">
  <div class="title">Calcu Abhi</div>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <button class="clear" onclick="clearAll()">AC</button>
      <button class="backspace" onclick="backspace()">←</button>
      <button class="op" onclick="appendStr('(')">(</button>
      <button class="op" onclick="appendStr(')')">)</button>

      <button onclick="appendStr('7')">7</button>
      <button onclick="appendStr('8')">8</button>
      <button onclick="appendStr('9')">9</button>
      <button class="op" onclick="appendStr('/')">÷</button>

      <button onclick="appendStr('4')">4</button>
      <button onclick="appendStr('5')">5</button>
      <button onclick="appendStr('6')">6</button>
      <button class="op" onclick="appendStr('*')">×</button>

      <button onclick="appendStr('1')">1</button>
      <button onclick="appendStr('2')">2</button>
      <button onclick="appendStr('3')">3</button>
      <button class="op" onclick="appendStr('-')">−</button>

      <button onclick="appendStr('0')" class="zero">0</button>
      <button onclick="appendStr('.')">.</button>
      <button class="op" onclick="appendStr('+')">+</button>
      <button class="equal" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  function goToCalc() {
    document.getElementById('welcomePage').classList.remove('active');
    document.getElementById('calcPage').classList.add('active');
  }

  let expr = '';
  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function displayExpr() {
    const pretty = expr.replace(/\*/g,'×').replace(/\//g,'÷');
    expressionEl.textContent = pretty || '';
    resultEl.textContent = expr || '0';
    resultEl.className = 'result';
    if (resultEl.textContent.length > 10) resultEl.classList.add('tiny');
    else if (resultEl.textContent.length > 7) resultEl.classList.add('small');
  }

  function appendStr(val) {
    const last = expr.slice(-1);
    const ops = ['+','-','*','/'];
    if (ops.includes(val) && ops.includes(last)) expr = expr.slice(0,-1);
    if (expr === '' && ops.includes(val) && val !== '-') return;
    expr += val;
    displayExpr();
  }

  function backspace() {
    expr = expr.slice(0, -1);
    displayExpr();
  }

  function calculate() {
    if (!expr) return;
    try {
      let fixed = expr.replace(/(\d)\(/g, '$1*(');   // 2(5) → 2*(5) fix
      let res = Function('"use strict"; return (' + fixed + ')')();
      if (!isFinite(res)) throw '';
      res = parseFloat(res.toFixed(10));
      expr = String(res);
      displayExpr();
    } catch(e) {
      resultEl.textContent = 'Error';
      setTimeout(clearAll, 1200);
    }
  }

  function clearAll() {
    expr = '';
    expressionEl.textContent = '';
    resultEl.textContent = '0';
    resultEl.className = 'result';
  }
</script>
</body>
</html>
