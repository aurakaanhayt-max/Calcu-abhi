<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0,255,180,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,150,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .title {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #00ffb4;
    text-shadow:
      0 0 10px #00ffb4,
      0 0 25px #00ffb4,
      0 0 50px #00c896,
      0 0 80px rgba(0,255,180,0.4);
    margin-bottom: 18px;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  .calculator {
    background: #111118;
    border: 1px solid rgba(0,255,180,0.2);
    border-radius: 20px;
    padding: 24px;
    width: 320px;
    box-shadow:
      0 0 0 1px rgba(0,255,180,0.05),
      0 0 40px rgba(0,255,180,0.08),
      0 30px 60px rgba(0,0,0,0.8);
    position: relative;
  }

  .calculator::before {
    content: 'CALC-X1';
    position: absolute;
    top: -10px;
    left: 20px;
    background: #0a0a0f;
    color: rgba(0,255,180,0.4);
    font-size: 10px;
    letter-spacing: 3px;
    padding: 0 8px;
    font-family: 'Orbitron', sans-serif;
  }

  .display {
    background: #0d0d15;
    border: 1px solid rgba(0,255,180,0.15);
    border-radius: 12px;
    padding: 20px 16px 14px;
    margin-bottom: 20px;
    text-align: right;
    position: relative;
    overflow: hidden;
  }

  .display::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,180,0.4), transparent);
  }

  .expression {
    color: rgba(0,255,180,0.4);
    font-size: 12px;
    min-height: 18px;
    letter-spacing: 1px;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .result {
    color: #00ffb4;
    font-family: 'Orbitron', sans-serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,255,180,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.1s;
  }

  .result.small { font-size: 24px; }
  .result.tiny { font-size: 18px; }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    background: #1a1a26;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    color: #e0e0f0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    height: 64px;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 1px;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 70%);
    opacity: 0;
    transition: opacity 0.15s;
  }

  button:active::after { opacity: 1; }

  button:hover {
    border-color: rgba(0,255,180,0.3);
    background: #1f1f30;
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  button:active { transform: translateY(0); }

  button.op {
    background: #0f1f20;
    border-color: rgba(0,255,180,0.2);
    color: #00ffb4;
    text-shadow: 0 0 10px rgba(0,255,180,0.5);
  }

  button.op:hover {
    background: #152a2b;
    border-color: rgba(0,255,180,0.5);
    box-shadow: 0 0 20px rgba(0,255,180,0.15), 0 4px 15px rgba(0,0,0,0.4);
  }

  button.equal {
    background: linear-gradient(135deg, #00c896, #00a07a);
    border-color: #00ffb4;
    color: #001a12;
    font-weight: 700;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(0,200,150,0.3);
  }

  button.equal:hover {
    background: linear-gradient(135deg, #00ffb4, #00c896);
    box-shadow: 0 0 30px rgba(0,255,180,0.4), 0 4px 15px rgba(0,0,0,0.4);
  }

  button.clear {
    background: #1f0f15;
    border-color: rgba(255,80,100,0.3);
    color: #ff5064;
    text-shadow: 0 0 10px rgba(255,80,100,0.5);
  }

  button.clear:hover {
    background: #2a1018;
    border-color: rgba(255,80,100,0.6);
    box-shadow: 0 0 20px rgba(255,80,100,0.15), 0 4px 15px rgba(0,0,0,0.4);
  }

  button.zero { grid-column: span 2; }

  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(0,255,180,0.1);
    animation: scan 3s linear infinite;
    pointer-events: none;
    border-radius: 20px;
  }

  @keyframes scan {
    0% { top: 0; opacity: 1; }
    90% { opacity: 0.5; }
    100% { top: 100%; opacity: 0; }
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .pop { animation: pop 0.1s ease; }

  .page { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; width: 100%; }
  .page.active { display: flex; }

  .welcome-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #00ffb4;
    text-align: center;
    letter-spacing: 4px;
    line-height: 1.4;
    text-shadow: 0 0 10px #00ffb4, 0 0 30px #00ffb4, 0 0 60px #00c896;
    animation: flicker 3s infinite;
    margin-bottom: 40px;
    padding: 0 20px;
  }

  .continue-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #001a12;
    background: linear-gradient(135deg, #00ffb4, #00c896);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    height: auto;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(0,255,180,0.4), 0 8px 20px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
    animation: pulse 2s infinite;
  }

  .continue-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 50px rgba(0,255,180,0.6), 0 12px 30px rgba(0,0,0,0.6);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0,255,180,0.4), 0 8px 20px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 50px rgba(0,255,180,0.7), 0 8px 20px rgba(0,0,0,0.5); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.5s ease forwards; }
</style>
</head>
<body>

<!-- Welcome Page -->
<div class="page active" id="welcomePage">
  <div class="welcome-title">Welcome to<br>Calcu Abhi</div>
  <button class="continue-btn" onclick="goToCalc()">CONTINUE ➜</button>
</div>

<!-- Calculator Page -->
<div class="page" id="calcPage">
<div style="display:flex; flex-direction:column; align-items:center; padding: 20px 0;">
<div class="title">Calcu Abhi</div>
<div class="calculator">
  <div class="scanline"></div>
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="buttons">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="op" onclick="appendStr('(')"> ( </button>
    <button class="op" onclick="appendStr(')')"> ) </button>
    <button class="op" onclick="appendStr('/')">÷</button>

    <button onclick="appendStr('7')">7</button>
    <button onclick="appendStr('8')">8</button>
    <button onclick="appendStr('9')">9</button>
    <button class="op" onclick="appendStr('*')">×</button>

    <button onclick="appendStr('4')">4</button>
    <button onclick="appendStr('5')">5</button>
    <button onclick="appendStr('6')">6</button>
    <button class="op" onclick="appendStr('-')">−</button>

    <button onclick="appendStr('1')">1</button>
    <button onclick="appendStr('2')">2</button>
    <button onclick="appendStr('3')">3</button>
    <button class="op" onclick="appendStr('+')">+</button>

    <button onclick="appendStr('0')" class="zero">0</button>
    <button onclick="appendStr('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>
</div>
</div>

<script>
  function goToCalc() {
    document.getElementById('welcomePage').classList.remove('active');
    const calc = document.getElementById('calcPage');
    calc.classList.add('active');
    calc.classList.add('fade-in');
  }

  let expr = '';
  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function displayExpr() {
    const pretty = expr.replace(/\*/g,'×').replace(/\//g,'÷');
    expressionEl.textContent = pretty || '';
    resultEl.textContent = expr || '0';
    resultEl.className = 'result';
    if (resultEl.textContent.length > 10) resultEl.classList.add('tiny');
    else if (resultEl.textContent.length > 7) resultEl.classList.add('small');
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');
  }

  function appendStr(val) {
    // Prevent double operators
    const lastChar = expr.slice(-1);
    const ops = ['+','-','*','/'];
    if (ops.includes(val) && ops.includes(lastChar)) {
      expr = expr.slice(0, -1);
    }
    // Prevent leading operator (except minus)
    if (expr === '' && ops.includes(val) && val !== '-') return;
    expr += val;
    displayExpr();
  }

  function calculate() {
    if (!expr) return;
    try {
      expressionEl.textContent = expr.replace(/\*/g,'×').replace(/\//g,'÷') + ' =';
      let result = Function('"use strict"; return (' + expr + ')')();
      if (!isFinite(result)) { resultEl.textContent = 'Error'; return; }
      result = parseFloat(result.toFixed(10));
      expr = String(result);
      resultEl.textContent = expr;
      resultEl.className = 'result';
      if (expr.length > 10) resultEl.classList.add('tiny');
      else if (expr.length > 7) resultEl.classList.add('small');
    } catch(e) {
      resultEl.textContent = 'Error';
      expr = '';
    }
  }

  function clearAll() {
    expr = '';
    expressionEl.textContent = '';
    resultEl.textContent = '0';
    resultEl.className = 'result';
  }
</script>
</body>
</html>
