<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcu Abhi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,255,180,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,150,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .page {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
  }
  .page.active { display: flex; }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 30px rgba(0,255,180,0.4), 0 8px 20px rgba(0,0,0,0.5); }
    50%       { box-shadow: 0 0 50px rgba(0,255,180,0.7), 0 8px 20px rgba(0,0,0,0.5); }
  }
  @keyframes scan {
    0%   { top: 0;    opacity: 1; }
    90%  {            opacity: 0.5; }
    100% { top: 100%; opacity: 0; }
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .fade-in { animation: fadeIn 0.5s ease forwards; }

  /* WELCOME */
  .welcome-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #00ffb4;
    text-align: center;
    letter-spacing: 4px;
    line-height: 1.4;
    text-shadow: 0 0 10px #00ffb4, 0 0 30px #00ffb4, 0 0 60px #00c896;
    animation: flicker 3s infinite;
    margin-bottom: 40px;
    padding: 0 20px;
  }
  .continue-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #001a12;
    background: linear-gradient(135deg, #00ffb4, #00c896);
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    cursor: pointer;
    animation: pulse 2s infinite;
  }

  /* CALC WRAPPER */
  .calc-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    width: 100%;
  }
  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 6px;
    color: #00ffb4;
    text-shadow: 0 0 10px #00ffb4, 0 0 25px #00ffb4, 0 0 50px #00c896;
    margin-bottom: 16px;
    animation: flicker 3s infinite;
  }
  .calculator {
    background: #111118;
    border: 1px solid rgba(0,255,180,0.2);
    border-radius: 20px;
    padding: 20px;
    width: 340px;
    box-shadow: 0 0 40px rgba(0,255,180,0.08), 0 30px 60px rgba(0,0,0,0.8);
    position: relative;
  }
  .calculator::before {
    content: 'CALC-X1';
    position: absolute;
    top: -10px; left: 20px;
    background: #0a0a0f;
    color: rgba(0,255,180,0.4);
    font-size: 10px;
    letter-spacing: 3px;
    padding: 0 8px;
    font-family: 'Orbitron', sans-serif;
  }
  .scanline {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(0,255,180,0.1);
    animation: scan 3s linear infinite;
    pointer-events: none;
    border-radius: 20px;
  }

  /* DISPLAY */
  .display {
    background: #0d0d15;
    border: 1px solid rgba(0,255,180,0.15);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: right;
    position: relative;
    overflow: hidden;
    min-height: 80px;
  }
  .display::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,180,0.4), transparent);
  }
  .expression {
    color: rgba(0,255,180,0.4);
    font-size: 12px;
    min-height: 18px;
    letter-spacing: 1px;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result {
    color: #00ffb4;
    font-family: 'Orbitron', sans-serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,255,180,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: all 0.1s;
  }
  .result.small { font-size: 22px; }
  .result.tiny  { font-size: 16px; }
  .pop { animation: pop 0.1s ease; }

  /* BUTTONS */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .last-row {
    grid-column: span 4;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  button {
    background: #1a1a26;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    color: #e0e0f0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    height: 60px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  button:active { background: #2a2a40; }

  button.op {
    background: #0f1f20;
    border-color: rgba(0,255,180,0.2);
    color: #00ffb4;
    text-shadow: 0 0 10px rgba(0,255,180,0.4);
  }
  button.op:active { background: #1a3535; }

  button.equal {
    background: linear-gradient(135deg, #00c896, #00a07a);
    border-color: #00ffb4;
    color: #001a12;
    font-weight: 700;
    font-size: 22px;
  }
  button.clear {
    background: #1f0f15;
    border-color: rgba(255,80,100,0.3);
    color: #ff5064;
  }

  /* POWER MENU */
  .power-menu {
    position: fixed;
    background: #1a1a2e;
    border: 1px solid rgba(0,255,180,0.5);
    border-radius: 14px;
    padding: 8px;
    display: none;
    flex-direction: row;
    gap: 6px;
    z-index: 9999;
    box-shadow: 0 0 25px rgba(0,255,180,0.3);
  }
  .power-menu.show { display: flex; }
  .power-menu button {
    background: #0f1f20;
    border: 1px solid rgba(0,255,180,0.3);
    border-radius: 8px;
    color: #00ffb4;
    font-size: 14px;
    height: 44px;
    width: 44px;
    touch-action: auto;
  }
  .power-menu button:active { background: #00ffb4; color: #001a12; }
</style>
</head>
<body>

<!-- Power Menu -->
<div class="power-menu" id="powerMenu">
  <button onclick="addPower('**2')">x²</button>
  <button onclick="addPower('**3')">x³</button>
  <button onclick="addPower('**4')">x⁴</button>
  <button onclick="addPower('**5')">x⁵</button>
  <button onclick="addPower('**')">xⁿ</button>
</div>

<!-- Welcome Page -->
<div class="page active" id="welcomePage">
  <div class="welcome-title">Welcome to<br>Calcu Abhi</div>
  <button class="continue-btn" onclick="goToCalc()">CONTINUE ➜</button>
</div>

<!-- Calculator Page -->
<div class="page" id="calcPage">
  <div class="calc-wrapper">
    <div class="title">Calcu Abhi</div>
    <div class="calculator">
      <div class="scanline"></div>
      <div class="display">
        <div class="expression" id="expression"></div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">

        <button class="clear"  onclick="clearAll()">AC</button>
        <button class="op"     onclick="appendStr('(')">(</button>
        <button class="op"     onclick="appendStr(')')">)</button>
        <button class="op"     onclick="appendStr('/')">÷</button>

        <button id="n7">7</button>
        <button id="n8">8</button>
        <button id="n9">9</button>
        <button class="op" onclick="appendStr('*')">×</button>

        <button id="n4">4</button>
        <button id="n5">5</button>
        <button id="n6">6</button>
        <button class="op" onclick="appendStr('-')">−</button>

        <button id="n1">1</button>
        <button id="n2">2</button>
        <button id="n3">3</button>
        <button class="op" onclick="appendStr('+')">+</button>

        <div class="last-row">
          <button class="op" onclick="appendRoot()">√</button>
          <button id="n0">0</button>
          <button onclick="appendStr('.')">.</button>
          <button class="op" onclick="backspace()">⌫</button>
          <button class="equal" onclick="calculate()">=</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
  // PAGE SWITCH
  function goToCalc() {
    document.getElementById('welcomePage').classList.remove('active');
    var c = document.getElementById('calcPage');
    c.classList.add('active');
    c.classList.add('fade-in');
  }

  // EXPRESSION STATE
  var expr = '';
  var resultEl  = document.getElementById('result');
  var exprEl    = document.getElementById('expression');

  function prettify(s) {
    return s
      .replace(/Math\.sqrt\(/g,'√(')
      .replace(/\*\*2/g,'²').replace(/\*\*3/g,'³')
      .replace(/\*\*4/g,'⁴').replace(/\*\*5/g,'⁵')
      .replace(/\*\*/g,'^')
      .replace(/\*/g,'×').replace(/\//g,'÷');
  }

  function displayExpr() {
    var p = prettify(expr);
    exprEl.textContent = p || '';
    resultEl.textContent = p || '0';
    resultEl.className = 'result';
    var len = (p || '0').length;
    if (len > 12) resultEl.classList.add('tiny');
    else if (len > 8) resultEl.classList.add('small');
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');
  }

  function appendStr(val) {
    var last = expr.slice(-1);
    var ops  = ['+','-','*','/'];
    if (val === '(' && last && !ops.includes(last) && last !== '(') expr += '*';
    if ((val === '(' || (!isNaN(val) && val !== '')) && last === ')') expr += '*';
    if (ops.includes(val) && ops.includes(last)) expr = expr.slice(0,-1);
    if (expr === '' && ops.includes(val) && val !== '-') return;
    expr += val;
    displayExpr();
  }

  function backspace() {
    if (expr.endsWith('Math.sqrt(')) expr = expr.slice(0,-10);
    else expr = expr.slice(0,-1);
    displayExpr();
  }

  function appendRoot() {
    var last = expr.slice(-1);
    var ops  = ['+','-','*','/'];
    if (last && !ops.includes(last) && last !== '(') expr += '*';
    expr += 'Math.sqrt(';
    displayExpr();
  }

  function calculate() {
    if (!expr) return;
    try {
      exprEl.textContent = prettify(expr) + ' =';
      var res = Function('"use strict"; return (' + expr + ')')();
      if (!isFinite(res)) { resultEl.textContent = 'Error'; expr = ''; return; }
      res  = parseFloat(res.toFixed(10));
      expr = String(res);
      resultEl.textContent = expr;
      resultEl.className = 'result';
      if (expr.length > 12) resultEl.classList.add('tiny');
      else if (expr.length > 8) resultEl.classList.add('small');
    } catch(e) {
      resultEl.textContent = 'Error';
      expr = '';
    }
  }

  function clearAll() {
    expr = '';
    exprEl.textContent = '';
    resultEl.textContent = '0';
    resultEl.className = 'result';
    hidePowerMenu();
  }

  // POWER MENU
  function showPowerMenu(el) {
    var menu = document.getElementById('powerMenu');
    var rect = el.getBoundingClientRect();
    var top  = rect.top - 65;
    var left = rect.left;
    if (left + 245 > window.innerWidth) left = window.innerWidth - 250;
    if (top < 5) top = rect.bottom + 5;
    menu.style.top  = top  + 'px';
    menu.style.left = left + 'px';
    menu.classList.add('show');
  }

  function hidePowerMenu() {
    document.getElementById('powerMenu').classList.remove('show');
  }

  function addPower(pow) {
    expr += pow;
    displayExpr();
    hidePowerMenu();
  }

  document.addEventListener('pointerdown', function(e) {
    var menu = document.getElementById('powerMenu');
    if (menu.classList.contains('show') && !menu.contains(e.target)) hidePowerMenu();
  });

  // LONG PRESS for number buttons using touchstart/touchend
  var LONG_MS  = 500;
  var ltimer   = null;
  var lfired   = false;

  function attachLongPress(id, num) {
    var el = document.getElementById(id);
    if (!el) return;

    // Touch devices
    el.addEventListener('touchstart', function(e) {
      e.preventDefault();          // stops ghost click
      lfired = false;
      ltimer = setTimeout(function() {
        lfired = true;
        appendStr(num);
        showPowerMenu(el);
      }, LONG_MS);
    }, { passive: false });

    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      clearTimeout(ltimer);
      if (!lfired) appendStr(num);
      lfired = false;
    });

    el.addEventListener('touchcancel', function() {
      clearTimeout(ltimer);
      lfired = false;
    });

    // Mouse (desktop)
    el.addEventListener('mousedown', function() {
      lfired = false;
      ltimer = setTimeout(function() {
        lfired = true;
        appendStr(num);
        showPowerMenu(el);
      }, LONG_MS);
    });

    el.addEventListener('mouseup', function() {
      clearTimeout(ltimer);
      if (!lfired) appendStr(num);
      lfired = false;
    });

    el.addEventListener('mouseleave', function() {
      clearTimeout(ltimer);
      lfired = false;
    });
  }

  attachLongPress('n0','0');
  attachLongPress('n1','1');
  attachLongPress('n2','2');
  attachLongPress('n3','3');
  attachLongPress('n4','4');
  attachLongPress('n5','5');
  attachLongPress('n6','6');
  attachLongPress('n7','7');
  attachLongPress('n8','8');
  attachLongPress('n9','9');
</script>
</body>
</html>
